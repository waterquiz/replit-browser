kind = "web"
  previewPath = "/"
  title = "Browser Desktop"
  version = "1.0.0"
  id = "artifacts/browser-desktop"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 20788

  [services.development]
  run = "pnpm --filter @workspace/browser-desktop run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/browser-desktop", "run", "build" ]
  publicDir = "artifacts/browser-desktop/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "20788"
  BASE_PATH = "/"

  [[services]]
  name = "novnc"
  paths = [ "/novnc" ]
  localPort = 5901

  [services.development]
  run = "bash /home/runner/workspace/start.sh"

  [services.production]
  run = ["bash", "/home/runner/workspace/start.sh"]

  [services.production.health.startup]
  path = "/novnc/vnc.html"
  